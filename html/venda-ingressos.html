            <!-- Formulário de venda de ingressos -->
            <form action="/vender-ingresso" method="post" id="form-ingresso">

<div class="container mt-4">
    <table class="table table-dark table-hover border-secondary">
        <tbody id="sessao-selecionada">
            </tbody>
    </table>

                <label for="nomeClient">Nome do Cliente:</label>
                <input type="text" id="nomeClient" name="nomeClient" required><br><br>

                <label for="CPF">CPF:</label>
                <input type="number" id="CPF" name="CPF" required><br><br>

                <label for="assento">Assento:</label>
                <input type="text" id="assento" name="assento" required><br><br>

                <label for="pagamento">Tipo de Pagamento:</label>
                <select id="pagamento" name="pagamento" required>
                    <option value="" disabled selected>Selecione o tipo de pagamento...</option>
                    <option value="cartao">Cartão</option>
                    <option value="pix">Pix</option>
                    <option value="dinheiro">Dinheiro</option>
                </select><br><br>

                <button type="submit">Vender Ingressos</button>

                <!-- Chama a função de validação dos campos do formulário antes de enviar os dados para o servidor -->
            </form>
