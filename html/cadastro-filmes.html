    <h1>Cadastro de Filmes</h1>
    <h2>Formulário para cadastro de filmes de cinema.</h2>

    <form id="form-filme">
        <label for="titulo">Título:</label>
        <input type="text" id="titulo" name="titulo" required> <br><br>

        <label for="genero">Gênero:</label>
        <input type="text" id="genero" name="genero" required> <br><br>

        <label for="descricao">Descrição:</label> <br>
        <textarea id="descricao" name="descricao" required style="text-align: center;"></textarea> <br><br>

        <label for="classificacao">Classificação indicativa:</label>
        <select id="classificacao" name="classificacao" required>
            <option value="">Selecione...</option>
            <option value="L">L</option>
            <option value="10">10</option>
            <option value="12">12</option>
            <option value="14">14</option>
            <option value="16">16</option>
            <option value="18">18</option>
        </select> <br><br>

        <label for="duracao">Duração (minutos):</label>
        <input type="number" id="duracao" name="duracao" required> <br><br>

        <label for="date">Data de lançamento:</label>
        <input type="date" id="date" name="date" required> <br><br>

        <button type="submit">Salvar filme</button>
    </form>

    <script src="/JS/cadastro-filmes.js"></script>
     <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
