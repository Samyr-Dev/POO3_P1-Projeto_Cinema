<nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">Salas</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">

                    <li class="nav-item">

    <<div class="container mt-4" id="salas">
    <table class="table table-dark table-hover border-secondary">
        <thead>
            <tr>
                <th>Cadastro de Salas</th>
            </tr>
        </thead>
    </table>
</div>

    <form id="form-sala">
        <label for="nome">Nome da sala:</label> <br>
        <input type="text" id="nome" name="nome" required><br><br>

        <label for="capacidade">Capacidade:</label> <br>
        <input type="number" id="capacidade" name="capacidade" required><br><br>

        <label for="tipo">Tipo de sala:</label> <br>
        <select id="tipo" name="tipo" required>
            <option value="">Selecione...</option>
            <option value="2D">2D</option>
            <option value="3D">3D</option>
            <option value="IMAX">IMAX</option>
        </select><br><br>

        <button id="btn-salvar" type="submit">Salvar sala</button>
    </form>

    <script src="/JS/cadastro-salas.js"></script>
</body>
