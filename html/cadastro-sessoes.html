<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Sessões</title>
    <link rel="stylesheet" href="/css/style.css">
      <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
 
</head>

<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">Cadastro de Sessões</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="/html/index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/html/cadastro-filmes.html">Cadastro de Filmes</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/html/cadastro-salas.html">Cadastro de Salas</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/html/sessoes.html">Sessões</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/html/venda-ingressos.html">Venda de Ingressos</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <div class="container mt-4" id="cadastro-sessoes">
    <table class="table table-dark table-hover border-secondary">
        <thead>
            <tr>
                <th>Cadastro de Sessões</th>
            </tr>
        </thead>
    </table>
</div>
    <!-- Formulário de cadastro de sessões -->
    <form action="/cadastrar-sessao" method="post" id="form-sessao">

        <label for="filmeSalvos">Filme:</label> <br>
        <select id="filmeSalvos" name="filmeSalvos" required>
            <option value="" disabled selected>Selecione um filme...</option>
            <!-- Opções de filmes serão preenchidas dinamicamente -->
        </select><br><br>


        <label for="sala">Sala:</label> <br>
        <select id="sala" name="sala" required>
            <option value="" disabled selected>Selecione uma sala...</option>
            <!-- Opções de salas serão preenchidas dinamicamente -->
        </select><br><br>


        <label for="horario">Horário:</label> <br>
        <input type="datetime-local" id="horario" name="horario" required><br><br>

        <label for="preco">Preço:</label> <br>
        <input type="number" id="preco" name="preco" step="0.01" required><br><br>

        <label for="idioma">Idioma:</label> <br>
        <select id="idioma" name="idioma" required>
            <option value="" disabled selected>Selecione o idioma...</option>
            <option value="Dublado">Dublado</option>
            <option value="Legendado">Legendado</option>
        </select><br><br>

        <label for="tipo">Formato da Sessão:</label> <br>
        <select id="tipo" name="tipo" required>
            <option value="" disabled selected>Selecione o formato...</option>
            <option value="2D">2D</option>
            <option value="3D">3D</option>
        </select><br><br>

        <button id="btn-salvar-sessao" type="submit">Salvar sessão</button>

    </form>

    <script src="/JS/cadastro-sessoes.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
